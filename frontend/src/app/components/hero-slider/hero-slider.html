<swiper-container navigation="true" pagination="true" scrollbar="true" loop="true" autoplay-delay="5000">
  <swiper-slide *ngFor="let slide of slides" [style.background-color]="slide.bg">
    <div class="slide-content">
      <h1>{{ slide.title }}</h1>
      <p>{{ slide.desc }}</p>
     <a href="assets/remote_divyaraval_laravel_php.pdf" 
      download="remote_divyaraval_laravel_php.pdf" 
      class="btn-teal">
      Download CV

    </div>
  </swiper-slide>
</swiper-container>
