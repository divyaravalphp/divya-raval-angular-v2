<div class="mgmt-container">
  <div class="header-section">
    <h1>Manage Profile Information</h1>
  </div>

  @if (successMsg()) {
    <div class="toast-success">{{ successMsg() }}</div>
  }

  <div class="form-card">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <input type="hidden" formControlName="id">

      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input formControlName="full_name" type="text">
        </div>

        <div class="form-group">
          <label>Current Title</label>
          <input formControlName="current_title" type="text">
        </div>

        <div class="form-group full-width">
          <label>Summary Bio</label>
          <textarea formControlName="summary" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input formControlName="email" type="email">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input formControlName="phone" type="text">
        </div>

        <div class="form-group">
          <label>Address Line 1</label>
          <input formControlName="address_line_1" type="text">
        </div>

        <div class="form-group">
          <label>Address Line 2</label>
          <input formControlName="address_line_2" type="text">
        </div>

        <div class="form-group">
          <label>City</label>
          <input formControlName="city" type="text">
        </div>

         <div class="form-group">
          <label>State</label>
          <input formControlName="state" type="state">
        </div>

        <div class="form-group">
          <label>PIN code</label>
          <input formControlName="zip_code" type="zip_code">
        </div>

        <div class="form-group">
          <label>Experience (Years)</label>
          <input formControlName="experience_years" type="number">
        </div>
      </div>

      <div class="form-footer">
        <button type="submit" class="btn-save" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Saving...' : 'Update Profile' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div style="background: #fff3cd; padding: 10px; margin-top: 20px; border: 1px solid #ffeeba;">
  <strong>Debug Info:</strong> Status: {{ profileForm.status }} | ID: {{ profileForm.get('id')?.value }}
</div>
